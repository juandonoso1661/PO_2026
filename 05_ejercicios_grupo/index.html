<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author"
        content="alexanderpino@liceovvh.cl juandonoso@liceovvh.cl luisecheverria@liceovvh.cl jonathanalquinta@liceovvh.cl">
    <title>Actividad JS</title>
    <!-- Bootstrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <main class=" container-2 d-flex p-3 gap-3">

        <!-- Ejercicio 1 -->
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 1</h5>
                <p class="card-text">Función con validación de datos</p>
                <input type="text" class="form-control mb-3" id="input1" placeholder="...">
                <a href="#" class="btn btn-primary" onclick="ejercicio1()">Ejecutar</a>
                <div id="container1" class="d-none">
                    <h5>Resultado:</h5>
                    <div id="resultado1" class="alert alert-success fw-bold">
                    </div>
                </div>
            </div>
        </div>

        <!-- Ejercicio 2 -->
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 2</h5>
                <p class="card-text">Función que usa condicional múltiple</p>
                <input type="text" class="form-control mb-3" id="input2" placeholder="...">
                <a href="#" class="btn btn-primary" onclick="ejercicio2()">Ejecutar</a>
                <div id="container2" class="d-none">
                    <h5>Resultado:</h5>
                    <div id="resultado2" class="alert alert-success fw-bold">
                    </div>
                </div>
            </div>
        </div>

        <!-- Ejercicio 3 -->
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 3</h5>
                <p class="card-text">Uso de múltiples funciones (flujo completo)</p>
                <input type="text" class="form-control mb-3" id="input3" placeholder="...">
                <a href="#" class="btn btn-primary" onclick="procesarNumero()">Ejecutar</a>
                <div id="container3" class="d-none">
                    <h5>Resultado:</h5>
                    <div id="resultado3" class="alert alert-success fw-bold">
                    </div>
                </div>
            </div>
        </div>

        <!-- Ejercicio 4 -->
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Ejercicio 4</h5>
                <p class="card-text">Función que transforma texto</p>
                <input type="text" class="form-control mb-3" id="input4" placeholder="...">
                <a href="#" class="btn btn-primary" onclick="transformarTexto()">Ejecutar</a>
                <div id="container4" class="d-none">
                    <h5>Resultado:</h5>
                    <div id="resultado4" class="alert alert-success fw-bold">
                    </div>
                </div>
            </div>
        </div>
    </main>


    <script src="static/js/script.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
